<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="どうぶつ">
<meta name="theme-color" content="#FF9F43">
<title>どうぶつ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
html,body{height:100%;overflow:hidden;background:#fff8f0;}
body{font-family:-apple-system,'Hiragino Maru Gothic Pro',sans-serif;}
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;overflow:hidden;}
#stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;transition:background .4s;background:#FF9F43;}
.aw{display:flex;flex-direction:column;align-items:center;gap:12px;position:relative;z-index:2;pointer-events:none;}
#aemoji{font-size:140px;line-height:1;transition:transform .15s;}
#aemoji.pop{transform:scale(1.3);}
#aimg{width:220px;height:220px;border-radius:32px;object-fit:cover;display:none;transition:transform .15s;box-shadow:0 8px 32px rgba(0,0,0,0.15);}
#aimg.pop{transform:scale(1.08);}
#aname{font-size:36px;font-weight:700;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,0.2);}
#asound{font-size:22px;color:rgba(255,255,255,0.85);}
#hint{position:absolute;bottom:20px;left:0;right:0;text-align:center;font-size:13px;color:rgba(255,255,255,0.7);pointer-events:none;}
#cnt{position:absolute;top:max(16px,env(safe-area-inset-top,16px));right:max(16px,env(safe-area-inset-right,16px));background:rgba(255,255,255,0.25);border-radius:99px;padding:4px 14px;font-size:15px;font-weight:700;color:#fff;z-index:3;pointer-events:none;}
#sync-badge{position:absolute;top:max(16px,env(safe-area-inset-top,16px));left:max(16px,env(safe-area-inset-left,16px));background:rgba(255,255,255,0.25);border-radius:99px;padding:4px 10px;font-size:11px;color:#fff;z-index:3;pointer-events:none;}
.bubble{position:absolute;border-radius:50%;pointer-events:none;animation:rise 1.1s ease-out forwards;z-index:5;}
@keyframes rise{0%{opacity:.9;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-200px) scale(1.8);}}
.npop{position:absolute;pointer-events:none;animation:nrise .9s ease-out forwards;z-index:6;font-weight:700;font-size:28px;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,0.2);}
@keyframes nrise{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-80px);}}
#nav{height:calc(72px + env(safe-area-inset-bottom,0px));background:rgba(255,255,255,0.97);border-top:1px solid rgba(0,0,0,0.07);display:flex;align-items:center;padding-top:10px;padding-bottom:max(10px,env(safe-area-inset-bottom));padding-left:max(10px,env(safe-area-inset-left));padding-right:max(10px,env(safe-area-inset-right));gap:8px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
#nav::-webkit-scrollbar{display:none;}
.ni{flex-shrink:0;width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2.5px solid transparent;transition:all .15s;overflow:hidden;background:#f5f5f5;}
.ni.on{border-color:#FF9F43;box-shadow:0 2px 10px rgba(255,159,67,0.4);}
.ni img{width:100%;height:100%;object-fit:cover;border-radius:11px;pointer-events:none;}
.ni .ne{font-size:28px;pointer-events:none;}
.nadd{background:#f0f0f0;border:2px dashed #ccc!important;}
.nadd span{font-size:26px;color:#aaa;line-height:1;}
#loading-overlay{position:fixed;inset:0;background:#FF9F43;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;color:#fff;}
#loading-overlay .logo{font-size:64px;margin-bottom:12px;}
#loading-overlay .ltxt{font-size:18px;font-weight:700;margin-bottom:6px;}
#loading-overlay .lsub{font-size:13px;opacity:.7;}
#mbg,#embg{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:100;display:none;align-items:flex-end;justify-content:center;}
#mbg.on,#embg.on{display:flex;}
#modal,#emmodal{background:#fff;border-radius:24px 24px 0 0;padding:20px 20px 44px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
#modal h2,#emmodal h2{font-size:17px;font-weight:700;margin-bottom:14px;text-align:center;color:#333;}
#pprev,#epprev{width:100%;height:130px;border-radius:14px;background:#f5f5f5;border:2px dashed #ddd;display:flex;align-items:center;justify-content:center;margin-bottom:12px;overflow:hidden;cursor:pointer;}
#pprev img,#epprev img{width:100%;height:100%;object-fit:cover;border-radius:12px;}
#pprev span,#epprev span{font-size:13px;color:#bbb;}
.mlbl{font-size:12px;color:#999;font-weight:600;margin-bottom:5px;letter-spacing:.04em;}
.minp{width:100%;height:44px;border:1.5px solid #e0e0e0;border-radius:10px;padding:0 12px;font-size:15px;font-family:inherit;outline:none;background:#fafafa;color:#333;margin-bottom:12px;}
.minp:focus{border-color:#FF9F43;}
.rec-area{background:#fff8f0;border-radius:14px;padding:14px;margin-bottom:12px;border:1.5px solid #ffe0b0;}
.rec-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.rec-title{font-size:13px;font-weight:700;color:#FF9F43;}
.rec-status{font-size:12px;color:#999;}
.rec-btns{display:flex;gap:8px;}
.rbtn{flex:1;height:42px;border-radius:10px;border:none;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}
.rbtn.rec{background:#FF6B6B;color:#fff;}
.rbtn.rec.recording{background:#cc0000;animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.7;}}
.rbtn.stop{background:#f0f0f0;color:#666;}
.rbtn.play{background:#FF9F43;color:#fff;}
.rbtn:disabled{opacity:.4;}
.rec-wave{height:32px;display:flex;align-items:center;justify-content:center;gap:2px;margin-bottom:8px;}
.rec-wave .bar{width:4px;border-radius:2px;background:#FF9F43;transition:height .1s;}
.mbtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;}
.mb{height:46px;border-radius:12px;border:none;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;}
.mb.cc{background:#f0f0f0;color:#666;}
.mb.ok{background:#FF9F43;color:#fff;}
#finp,#efinp{display:none;}
</style>
</head>
<body>
<div id="loading-overlay">
  <div class="logo">🐾</div>
  <div class="ltxt">どうぶつ</div>
  <div class="lsub">読み込み中...</div>
</div>
<audio id="snd" style="display:none"></audio>
<div id="app">
  <div id="stage">
    <div id="sync-badge">✓</div>
    <div id="cnt">0</div>
    <div class="aw">
      <div id="aemoji">🐶</div>
      <img id="aimg" src="" alt="" draggable="false">
      <div id="aname">いぬ</div>
      <div id="asound">わんわん</div>
    </div>
    <div id="hint">タップしてね</div>
  </div>
  <div id="nav">
    <div class="nadd ni" id="btnadd"><span>+</span></div>
  </div>
</div>
<div id="mbg">
  <div id="modal">
    <h2>どうぶつを追加</h2>
    <div id="pprev"><span>写真をタップして選ぶ</span></div>
    <input type="file" id="finp" accept="image/*">
    <div class="mlbl">なまえ（ひらがな）</div>
    <input class="minp" id="iname" placeholder="例：いぬ">
    <div class="rec-area">
      <div class="rec-top"><div class="rec-title">なきごえを録音</div><div class="rec-status" id="rec-status">準備OK</div></div>
      <div class="rec-wave" id="rec-wave">
        <div class="bar" style="height:6px"></div><div class="bar" style="height:10px"></div>
        <div class="bar" style="height:6px"></div><div class="bar" style="height:14px"></div>
        <div class="bar" style="height:8px"></div><div class="bar" style="height:12px"></div>
        <div class="bar" style="height:6px"></div><div class="bar" style="height:10px"></div>
        <div class="bar" style="height:6px"></div>
      </div>
      <div class="rec-btns">
        <button class="rbtn rec" id="btn-rec">録音開始</button>
        <button class="rbtn stop" id="btn-stop" disabled>停止</button>
        <button class="rbtn play" id="btn-play" disabled>再生</button>
      </div>
    </div>
    <div class="mlbl">なきごえ（テキスト）</div>
    <input class="minp" id="isound" placeholder="例：わんわん">
    <div class="mbtns">
      <button class="mb cc" id="mcancel">キャンセル</button>
      <button class="mb ok" id="mok">追加する</button>
    </div>
  </div>
</div>
<div id="embg">
  <div id="emmodal">
    <h2>編集</h2>
    <div id="epprev"><span>写真をタップして変更</span></div>
    <input type="file" id="efinp" accept="image/*">
    <div class="mlbl">なまえ</div>
    <input class="minp" id="einame" placeholder="例：いぬ">
    <div class="rec-area">
      <div class="rec-top"><div class="rec-title">なきごえを録音</div><div class="rec-status" id="erec-status">準備OK</div></div>
      <div class="rec-wave" id="erec-wave">
        <div class="bar" style="height:6px"></div><div class="bar" style="height:10px"></div>
        <div class="bar" style="height:6px"></div><div class="bar" style="height:14px"></div>
        <div class="bar" style="height:8px"></div><div class="bar" style="height:12px"></div>
        <div class="bar" style="height:6px"></div><div class="bar" style="height:10px"></div>
        <div class="bar" style="height:6px"></div>
      </div>
      <div class="rec-btns">
        <button class="rbtn rec" id="ebtn-rec">録音開始</button>
        <button class="rbtn stop" id="ebtn-stop" disabled>停止</button>
        <button class="rbtn play" id="ebtn-play" disabled>再生</button>
      </div>
    </div>
    <div class="mlbl">なきごえ（テキスト）</div>
    <input class="minp" id="eisound" placeholder="例：わんわん">
    <div class="mbtns">
      <button class="mb cc" id="emcancel">キャンセル</button>
      <button class="mb ok" id="emok">保存</button>
    </div>
  </div>
</div>
<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {getFirestore,collection,getDocs,addDoc,updateDoc,deleteDoc,doc,onSnapshot,orderBy,query} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyDBRJo-sjKrU_I1qmpT8vT984WHig3GoaQ",authDomain:"doubutsu-39cd6.firebaseapp.com",projectId:"doubutsu-39cd6",storageBucket:"doubutsu-39cd6.firebasestorage.app",messagingSenderId:"665574501069",appId:"1:665574501069:web:f3867e7979d07cee6fd784"};
const fbapp=initializeApp(firebaseConfig);
const db=getFirestore(fbapp);
const BGS=['#FF9F43','#FF6B9D','#5E9CFF','#3DC3A3','#A78BFA','#FB7185','#34D399','#FBBF24'];
const BCS=['#FF6B6B','#FF9F43','#FFDD57','#48C774','#3273DC','#B86BFF','#FF6B9D','#5E9CFF'];
const DEFS=[
  {emoji:'🐶',name:'いぬ',sound:'わんわん',img:null,audio:null,bg:'#FF9F43',order:0},
  {emoji:'🐱',name:'ねこ',sound:'にゃーにゃー',img:null,audio:null,bg:'#FF6B9D',order:1},
  {emoji:'🐮',name:'うし',sound:'もーもー',img:null,audio:null,bg:'#5E9CFF',order:2},
  {emoji:'🐷',name:'ぶた',sound:'ぶーぶー',img:null,audio:null,bg:'#FF85C0',order:3},
  {emoji:'🐸',name:'かえる',sound:'けろけろ',img:null,audio:null,bg:'#3DC3A3',order:4},
  {emoji:'🐥',name:'ひよこ',sound:'ぴよぴよ',img:null,audio:null,bg:'#FBBF24',order:5},
  {emoji:'🐘',name:'ぞう',sound:'ぱおーん',img:null,audio:null,bg:'#A78BFA',order:6},
  {emoji:'🦁',name:'らいおん',sound:'がおー',img:null,audio:null,bg:'#FB7185',order:7},
];
let animals=[],cur=0,cnt=0,switching=false;
let mediaRec=null,recAudioData=null,waveTimer=null,pdata=null;
let eMediaRec=null,eRecAudioData=null,eWaveTimer=null,epdata=null,editId=null;

// ── 音声 ──
// グローバルなaudio要素を再利用（iOS対応）
const snd=document.getElementById('snd');

function speak(a){
  if(a.audio){
    snd.src=a.audio;
    snd.load();
    snd.play().catch(()=>fallback(a.sound));
  } else {
    fallback(a.sound);
  }
}
function fallback(txt){
  try{
    if(!window.speechSynthesis)return;
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(txt);
    u.lang='ja-JP';u.rate=0.85;u.pitch=1.5;u.volume=1;
    const voices=speechSynthesis.getVoices();
    if(voices.length>0){
      const ja=voices.find(v=>v.lang==='ja-JP'||v.lang==='ja');
      if(ja) u.voice=ja;
    }
    speechSynthesis.speak(u);
  }catch(e){}
}
// Android: voicesの読み込みを待ってから再試行
if(window.speechSynthesis){
  speechSynthesis.onvoiceschanged=()=>{speechSynthesis.getVoices();};
  // 初回起動時にvoicesをキャッシュ
  setTimeout(()=>speechSynthesis.getVoices(),100);
}

// ── Firebase ──
function setSyncBadge(t){document.getElementById('sync-badge').textContent=t;}
async function initAnimals(){
  setSyncBadge('同期中...');
  try{
    const snap=await getDocs(query(collection(db,'animals'),orderBy('order','asc')));
    if(snap.empty){for(const d of DEFS)await addDoc(collection(db,'animals'),d);}
    const snap2=await getDocs(query(collection(db,'animals'),orderBy('order','asc')));
    animals=snap2.docs.map(d=>({id:d.id,...d.data()}));
    setSyncBadge('✓');
  }catch(e){setSyncBadge('オフライン');}
}
function subscribeAnimals(){
  onSnapshot(query(collection(db,'animals'),orderBy('order','asc')),snap=>{
    animals=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(cur>=animals.length)cur=Math.max(0,animals.length-1);
    renderNav();
    if(animals.length>0)setAnimal(cur);
    setSyncBadge('✓');
  },()=>setSyncBadge('オフライン'));
}

// ── 表示 ──
function setAnimal(i){
  if(!animals[i])return;
  const a=animals[i];
  const em=document.getElementById('aemoji'),im=document.getElementById('aimg');
  document.getElementById('aname').textContent=a.name;
  document.getElementById('asound').textContent=a.sound;
  document.getElementById('stage').style.background=a.bg||BGS[i%BGS.length];
  if(a.img){im.src=a.img;im.style.display='block';em.style.display='none';}
  else{em.textContent=a.emoji||'🐾';em.style.display='block';im.style.display='none';}
  document.querySelectorAll('.ni:not(.nadd)').forEach((el,j)=>el.classList.toggle('on',j===i));
  // 音声を事前セット
  if(a.audio){snd.src=a.audio;snd.load();}
}
function renderNav(){
  const nav=document.getElementById('nav'),add=document.getElementById('btnadd');
  nav.querySelectorAll('.ni:not(.nadd)').forEach(el=>el.remove());
  animals.forEach((a,i)=>{
    const el=document.createElement('div');
    el.className='ni'+(i===cur?' on':'');
    el.innerHTML=a.img?`<img src="${a.img}" alt="${a.name}" draggable="false">`:`<span class="ne">${a.emoji||'🐾'}</span>`;
    el.addEventListener('click',()=>{
      cur=i;cnt=0;document.getElementById('cnt').textContent='0';
      setAnimal(i);speak(a);
    });
    let pt=null;
    el.addEventListener('touchstart',()=>{pt=setTimeout(()=>{
      const c=confirm(a.name+'\n\nOK → 編集　キャンセル → 削除');
      if(c)openEditModal(i);
      else if(confirm(a.name+'を削除する？'))deleteDoc(doc(db,'animals',a.id));
    },700);},{passive:true});
    el.addEventListener('touchend',()=>clearTimeout(pt),{passive:true});
    nav.insertBefore(el,add);
  });
}

// ── エフェクト ──
function spawnBubbles(cx,cy){
  const st=document.getElementById('stage'),r=st.getBoundingClientRect();
  for(let i=0;i<10;i++){
    const b=document.createElement('div');b.className='bubble';
    const sz=16+Math.random()*34,ox=(Math.random()-.5)*160;
    b.style.cssText=`width:${sz}px;height:${sz}px;background:${BCS[Math.floor(Math.random()*BCS.length)]};left:${cx-r.left+ox-sz/2}px;top:${cy-r.top-sz/2}px;`;
    st.appendChild(b);setTimeout(()=>b.remove(),1200);
  }
}
function spawnNum(cx,cy,n){
  const st=document.getElementById('stage'),r=st.getBoundingClientRect();
  const el=document.createElement('div');el.className='npop';el.textContent=n;
  el.style.cssText=`left:${cx-r.left-14}px;top:${cy-r.top-30}px;`;
  st.appendChild(el);setTimeout(()=>el.remove(),950);
}

// ── タップ ──
document.getElementById('stage').addEventListener('click',e=>{
  if(!animals[cur]||switching)return;
  const a=animals[cur];
  cnt++;
  document.getElementById('cnt').textContent=cnt;
  spawnBubbles(e.clientX,e.clientY);
  spawnNum(e.clientX,e.clientY,cnt);
  speak(a);
  const tgt=a.img?document.getElementById('aimg'):document.getElementById('aemoji');
  tgt.classList.remove('pop');void tgt.offsetWidth;tgt.classList.add('pop');
  setTimeout(()=>tgt.classList.remove('pop'),200);
  if(cnt>=5){
    switching=true;cnt=0;
    document.getElementById('cnt').textContent='0';
    cur=(cur+1)%animals.length;
    setTimeout(()=>{setAnimal(cur);renderNav();speak(animals[cur]);switching=false;},400);
  }
});

// 右クリック・長押しメニュー防止
document.addEventListener('contextmenu',e=>{e.preventDefault();return false;});

// ── 録音ヘルパー ──
function getMime(){
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  if(isIOS&&MediaRecorder.isTypeSupported('audio/mp4'))return 'audio/mp4';
  if(MediaRecorder.isTypeSupported('audio/webm;codecs=opus'))return 'audio/webm;codecs=opus';
  if(MediaRecorder.isTypeSupported('audio/webm'))return 'audio/webm';
  return '';
}
function animWave(waveId,active,timer){
  const bars=document.querySelectorAll('#'+waveId+' .bar');
  if(timer)clearInterval(timer);
  if(active)return setInterval(()=>bars.forEach(b=>{b.style.height=(6+Math.random()*26)+'px';}),120);
  bars.forEach((b,i)=>{b.style.height=[6,10,6,14,8,12,6,10,6][i]+'px';});
  return null;
}
async function compressImage(b64,max=400){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      let w=img.width,h=img.height;
      if(w>h){if(w>max){h=h*max/w;w=max;}}else{if(h>max){w=w*max/h;h=max;}}
      c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      res(c.toDataURL('image/jpeg',0.7));
    };
    img.onerror=()=>res(b64);
    img.src=b64;
  });
}
function setupRecBtn(recId,stopId,statusId,waveId,onData){
  let mr=null,timer=null;
  document.getElementById(recId).addEventListener('click',async()=>{
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const chunks=[];
      const mt=getMime();
      mr=mt?new MediaRecorder(stream,{mimeType:mt}):new MediaRecorder(stream);
      mr.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
      mr.onstop=()=>{
        const blob=new Blob(chunks,{type:mr.mimeType||'audio/webm'});
        const reader=new FileReader();
        reader.onload=ev=>{onData(ev.target.result);};
        reader.readAsDataURL(blob);
        stream.getTracks().forEach(t=>t.stop());
        document.getElementById(statusId).textContent='録音完了！';
        document.getElementById(recId.replace('btn-rec','btn-play').replace('ebtn-rec','ebtn-play')).disabled=false;
        timer=animWave(waveId,false,timer);
        document.getElementById(recId).classList.remove('recording');
        document.getElementById(recId).textContent='録音開始';
        document.getElementById(stopId).disabled=true;
      };
      mr.start();
      // 3秒で自動停止
      setTimeout(()=>{if(mr&&mr.state!=='inactive')mr.stop();},3000);
      document.getElementById(recId).classList.add('recording');
      document.getElementById(recId).textContent='録音中(最大3秒)';
      document.getElementById(stopId).disabled=false;
      document.getElementById(statusId).textContent='🔴 録音中';
      timer=animWave(waveId,true,timer);
    }catch(e){alert('マイクへのアクセスを許可してください');}
  });
  document.getElementById(stopId).addEventListener('click',()=>{
    if(mr&&mr.state!=='inactive')mr.stop();
  });
  return ()=>{if(mr&&mr.state!=='inactive')mr.stop();timer=animWave(waveId,false,timer);};
}

// ── 追加モーダル ──
let stopAddRec=null;
setupRecBtn('btn-rec','btn-stop','rec-status','rec-wave',d=>recAudioData=d);
document.getElementById('btn-play').addEventListener('click',()=>{if(recAudioData){const au=new Audio(recAudioData);au.play();}});
document.getElementById('pprev').addEventListener('click',()=>document.getElementById('finp').click());
document.getElementById('finp').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{pdata=ev.target.result;document.getElementById('pprev').innerHTML=`<img src="${pdata}">`;};r.readAsDataURL(f);e.target.value='';
});
document.getElementById('btnadd').addEventListener('click',()=>{
  pdata=null;recAudioData=null;
  document.getElementById('iname').value='';document.getElementById('isound').value='';
  document.getElementById('pprev').innerHTML='<span>写真をタップして選ぶ</span>';
  document.getElementById('rec-status').textContent='準備OK';
  document.getElementById('btn-rec').classList.remove('recording');document.getElementById('btn-rec').textContent='録音開始';
  document.getElementById('btn-stop').disabled=true;document.getElementById('btn-play').disabled=true;
  animWave('rec-wave',false,null);
  document.getElementById('mbg').classList.add('on');
});
function closeAddModal(){document.getElementById('mbg').classList.remove('on');}
document.getElementById('mcancel').addEventListener('click',closeAddModal);
document.getElementById('mbg').addEventListener('click',e=>{if(e.target===document.getElementById('mbg'))closeAddModal();});
document.getElementById('mok').addEventListener('click',async()=>{
  const name=document.getElementById('iname').value.trim();
  const sound=document.getElementById('isound').value.trim()||'？';
  if(!name){alert('なまえを入れてね');return;}
  try{
    setSyncBadge('保存中...');
    let imgToSave=null;
    if(pdata){setSyncBadge('画像圧縮中...');imgToSave=await compressImage(pdata);}
    await addDoc(collection(db,'animals'),{
      emoji:'🐾',name,sound,img:imgToSave||null,audio:recAudioData||null,
      bg:BGS[animals.length%BGS.length],order:animals.length
    });
    closeAddModal();setSyncBadge('✓');
  }catch(e){alert('保存失敗: '+e.message);setSyncBadge('エラー');}
});

// ── 編集モーダル ──
setupRecBtn('ebtn-rec','ebtn-stop','erec-status','erec-wave',d=>eRecAudioData=d);
document.getElementById('ebtn-play').addEventListener('click',()=>{
  const src=eRecAudioData||(editId?animals.find(a=>a.id===editId)?.audio:null);
  if(src){const au=new Audio(src);au.play();}
});
document.getElementById('epprev').addEventListener('click',()=>document.getElementById('efinp').click());
document.getElementById('efinp').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{epdata=ev.target.result;document.getElementById('epprev').innerHTML=`<img src="${epdata}">`;};r.readAsDataURL(f);e.target.value='';
});
function openEditModal(i){
  const a=animals[i];editId=a.id;epdata=null;eRecAudioData=null;
  document.getElementById('einame').value=a.name||'';
  document.getElementById('eisound').value=a.sound||'';
  document.getElementById('epprev').innerHTML=a.img?`<img src="${a.img}">`:'<span>写真をタップして変更</span>';
  document.getElementById('erec-status').textContent=a.audio?'録音済み':'準備OK';
  document.getElementById('ebtn-rec').classList.remove('recording');document.getElementById('ebtn-rec').textContent='録音開始';
  document.getElementById('ebtn-stop').disabled=true;document.getElementById('ebtn-play').disabled=!a.audio;
  animWave('erec-wave',false,null);
  document.getElementById('embg').classList.add('on');
}
function closeEditModal(){document.getElementById('embg').classList.remove('on');}
document.getElementById('emcancel').addEventListener('click',closeEditModal);
document.getElementById('embg').addEventListener('click',e=>{if(e.target===document.getElementById('embg'))closeEditModal();});
document.getElementById('emok').addEventListener('click',async()=>{
  if(!editId)return;
  const name=document.getElementById('einame').value.trim();
  const sound=document.getElementById('eisound').value.trim();
  if(!name){alert('なまえを入れてね');return;}
  const upd={name,sound:sound||animals.find(a=>a.id===editId)?.sound};
  if(epdata!==null){setSyncBadge('画像圧縮中...');upd.img=await compressImage(epdata);}
  if(eRecAudioData!==null)upd.audio=eRecAudioData;
  try{
    setSyncBadge('保存中...');
    await updateDoc(doc(db,'animals',editId),upd);
    closeEditModal();setSyncBadge('✓');
  }catch(e){alert('保存失敗: '+e.message);setSyncBadge('エラー');}
});

// ── 起動 ──
initAnimals().then(()=>{
  renderNav();
  if(animals.length>0)setAnimal(0);
  subscribeAnimals();
  document.getElementById('loading-overlay').style.display='none';
});
</script>
</body>
</html>
